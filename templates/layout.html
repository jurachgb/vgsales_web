<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VGSales Analyzer 🎮</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- para compatibilidade com   !!!!importante -->
</head>
<body>
    
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            
            <a class="navbar-brand " >Vgsales 🎮</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                <a class="nav-link active link-color" aria-current="page" href="/">Home</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active link-color" aria-current="page" href="/global">Global Sales</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active link-color" aria-current="page" href="/anos">Year Sales</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active link-color" aria-current="page" href="/genero">Genre Sales</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active link-color" aria-current="page" href="/name">Search Games</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active link-color" aria-current="page" href="/compare">Compare Genres</a>
                </li>
                
            </ul>
            
        </div>
    </nav>


    <div class="container py-4 flex-grow-1">
        {% block content %}
        {% endblock %}
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
