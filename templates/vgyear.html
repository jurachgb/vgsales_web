{% extends "layout.html" %}

{% block content %}
    <h2>Year sales</h2>
    <row>
        <form method="POST">
            <input type="number" class="input-text" name="ano_selecionado" placeholder="Ano" autocomplete="off">
            <input type="number" name="quantidade"class="input" placeholder="Selecione a quantidade desejada" autocomplete="off">
            <button class="botão" type="submit">Lets see</button>
        </form>
        <div class="card-shadow-sm sombra">
            <div class="list-group list-group-flush">
                {% for i in jogos_ano %}
                <div class="list-group-item d-flex justify-content-between align-items-center lista">
                    <span>{{i[0]}}</span>
                    <span class="badge bg-primary rounded-pill">
                        {{ i[2] }} milhões
                    </span>
                </div>
                {% endfor %}
            </div>
        </div>
            {% if erro %}
                <p style="color: red;">{{ erro }}</p>
            {% endif %}
    </row>
{% endblock %}
